dataset_name: error
train_split: ['training']
val_split: ['training','validation']
dataset: {
  json_file: ./data/omnivore/annotations/recordings-combined.json,
  # PerceptionEncoder_feature_extractor.py: --output_dir ./data/features → perception_encoder npz here
  feat_folder: ./data/features/perception_encoder,
  file_prefix: ~,
  file_ext: .npz,
  num_classes: 353,
  # PE-Core-B-16 (default --pe_core_model_id); must match extractor output dim
  input_dim: 1024,
  feat_stride: 16,
  num_frames: 32,
  default_fps: 30,
  trunc_thresh: 0.3,
  crop_ratio: [0.9, 1.0],
  max_seq_len: 1024,
}
model: {
  regression_range: [[0, 4], [2, 8], [4, 16], [8, 32], [16, 64], [32, 10000]],
  fpn_type: identity,
  max_buffer_len_factor: 4.0,
  n_mha_win_size: 9,
}
opt: {
  learning_rate: 0.0001,
  epochs: 10,
  weight_decay: 0.05,
}
loader: {
  batch_size: 2,
}
train_cfg: {
  init_loss_norm: 250,
  clip_grad_l2norm: 1.0,
  cls_prior_prob: 0.01,
  center_sample: radius,
  center_sample_radius: 1.5,
}
test_cfg: {
  pre_nms_topk: 5000,
  max_seg_num: 2000,
  min_score: 0.001,
  nms_sigma : 0.4,
  multiclass_nms: True
}
substep1_2_output_folder: ./data/perception_encoder/actionformer_checkpoints/
